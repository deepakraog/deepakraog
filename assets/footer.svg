<svg width="1000" height="170" viewBox="0 0 1000 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fspace" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#03040c"/>
      <stop offset="60%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#1b1035"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#9d6bff"/>
      <stop offset="100%" stop-color="#ff6ec7"/>
    </linearGradient>
    <radialGradient id="fplanet" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#274b8f"/>
      <stop offset="60%" stop-color="#152a52"/>
      <stop offset="100%" stop-color="#0a1128"/>
    </radialGradient>
    <filter id="fglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="170" fill="url(#fspace)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="35" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="70" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="30" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="80" r="1"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="25" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="60" r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="30" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="75" r="1.1"><animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- planet horizon -->
  <ellipse cx="500" cy="300" rx="620" ry="185" fill="url(#fplanet)"/>
  <path d="M-120,170 A 620 185 0 0 1 1120,170" stroke="url(#fline)" stroke-width="2" fill="none" opacity="0.85" filter="url(#fglow)"/>

  <!-- orbiting satellite along horizon -->
  <g filter="url(#fglow)">
    <circle r="3.5" fill="#5fd7ff">
      <animateMotion dur="14s" repeatCount="indefinite" path="M -80,163 Q 500,88 1080,163"/>
    </circle>
  </g>

  <text x="500" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="6" fill="#8fd3ff">// END OF TRANSMISSION //</text>
  <text x="500" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" letter-spacing="3" fill="#7c8db0" opacity="0.9">
    <tspan>see you in the next orbit &#8212; keep exploring_</tspan>
    <animate attributeName="opacity" values="1;1;0.3;1" keyTimes="0;0.8;0.9;1" dur="2.4s" repeatCount="indefinite"/>
  </text>
</svg>
