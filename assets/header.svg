<svg width="1000" height="340" viewBox="0 0 1000 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03040c"/>
      <stop offset="45%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#1b1035"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.85" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetGrad" cx="0.35" cy="0.3" r="1">
      <stop offset="0%" stop-color="#ff8a5c"/>
      <stop offset="55%" stop-color="#d94f70"/>
      <stop offset="100%" stop-color="#6a1b6a"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="0.35" cy="0.3" r="1">
      <stop offset="0%" stop-color="#cfd8e3"/>
      <stop offset="100%" stop-color="#5c6b80"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#9d6bff"/>
      <stop offset="100%" stop-color="#ff6ec7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- deep space background -->
  <rect width="1000" height="340" fill="url(#space)"/>
  <rect width="1000" height="340" fill="url(#nebula1)"/>
  <rect width="1000" height="340" fill="url(#nebula2)"/>

  <!-- star layers with twinkle -->
  <g fill="#ffffff">
    <circle cx="40" cy="50" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="150" r="1"><animate attributeName="opacity" values="1;0.15;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="40" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="260" r="1.2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="90" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="270" cy="220" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="300" r="1.1"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="60" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="140" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="30" r="1.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="280" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="90" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="200" r="1.4"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="40" r="1.2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="150" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="260" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="80" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="310" r="1"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="180" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="990" cy="180" r="1"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g>
    <line x1="0" y1="0" x2="60" y2="18" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="150,20; 620,180" dur="3.2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="46" y2="10" stroke="#9be8ff" stroke-width="1.2" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="700,40; 990,140" dur="4.5s" begin="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" begin="3.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ringed planet, top right -->
  <g transform="translate(875,84)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="9s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="64" ry="14" fill="none" stroke="#e8b64c" stroke-width="3" opacity="0.8" transform="rotate(-18)"/>
      <circle r="34" fill="url(#planetGrad)"/>
      <path d="M-30,-14 Q -6,-24 22,-12 Q 4,-6 -14,-8 Z" fill="#ffffff" opacity="0.12"/>
      <path d="M-32,8 Q 0,18 30,6 Q 8,14 -16,14 Z" fill="#3d0f3d" opacity="0.35"/>
      <path d="M-64,12 A 64 14 0 0 0 64,-28" fill="none" stroke="#f6d488" stroke-width="3" opacity="0.9" transform="rotate(-18)"/>
    </g>
  </g>

  <!-- small moon, left -->
  <g transform="translate(95,90)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,8; 0,0" dur="11s" repeatCount="indefinite"/>
      <circle r="20" fill="url(#moonGrad)"/>
      <circle cx="-6" cy="-4" r="4" fill="#46536b" opacity="0.7"/>
      <circle cx="7" cy="6" r="3" fill="#46536b" opacity="0.6"/>
      <circle cx="4" cy="-9" r="2" fill="#46536b" opacity="0.5"/>
    </g>
  </g>

  <!-- rocket crossing -->
  <g opacity="0.95">
    <animateTransform attributeName="transform" type="translate" values="-80,300; 1080,60" dur="18s" repeatCount="indefinite"/>
    <g transform="rotate(-13)">
      <path d="M0,0 Q 14,-7 30,0 Q 14,7 0,0 Z" fill="#dfe7f1"/>
      <path d="M24,-3 L 30,0 L 24,3 Z" fill="#8fd3ff"/>
      <path d="M2,-2 L -6,-8 L -1,-1 Z" fill="#ff5c5c"/>
      <path d="M2,2 L -6,8 L -1,1 Z" fill="#ff5c5c"/>
      <circle cx="14" cy="0" r="2.4" fill="#22384f"/>
      <path d="M0,0 L -16,0" stroke="#ffb45c" stroke-width="3" stroke-linecap="round" opacity="0.8">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- astronaut floating on the right -->
  <g transform="translate(742,208)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-14; 0,0" dur="6s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-6;6;-6" dur="8s" repeatCount="indefinite"/>
        <!-- tether -->
        <path d="M-30,10 C -70,30 -95,-10 -130,6" stroke="#9fb4cc" stroke-width="2" fill="none" stroke-dasharray="5 5" opacity="0.7">
          <animate attributeName="stroke-dashoffset" values="0;20" dur="2s" repeatCount="indefinite"/>
        </path>
        <!-- backpack -->
        <rect x="-34" y="-26" width="20" height="42" rx="6" fill="#b9c6d6"/>
        <rect x="-31" y="-20" width="6" height="10" rx="2" fill="#7f93aa"/>
        <!-- left arm (behind body) -->
        <path d="M-12,-6 C -34,-2 -40,16 -52,22" stroke="#dfe7f1" stroke-width="11" stroke-linecap="round" fill="none"/>
        <circle cx="-52" cy="22" r="6.5" fill="#ffffff"/>
        <!-- legs -->
        <path d="M-4,26 C -8,42 -18,50 -30,56" stroke="#dfe7f1" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M8,28 C 12,44 22,50 32,58" stroke="#dfe7f1" stroke-width="12" stroke-linecap="round" fill="none"/>
        <circle cx="-31" cy="57" r="7" fill="#ffffff"/>
        <circle cx="33" cy="59" r="7" fill="#ffffff"/>
        <!-- torso -->
        <rect x="-18" y="-14" width="38" height="46" rx="15" fill="#f4f7fb"/>
        <rect x="-10" y="2" width="22" height="14" rx="4" fill="#c3d0de"/>
        <circle cx="-3" cy="8" r="2" fill="#ff5c5c"/>
        <circle cx="5" cy="8" r="2" fill="#39d98a"/>
        <!-- right arm waving -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0 16 -8; 14 16 -8; 0 16 -8" dur="3s" repeatCount="indefinite"/>
          <path d="M16,-8 C 34,-16 42,-32 48,-44" stroke="#f4f7fb" stroke-width="11" stroke-linecap="round" fill="none"/>
          <circle cx="49" cy="-46" r="6.5" fill="#ffffff"/>
        </g>
        <!-- helmet -->
        <circle cx="1" cy="-34" r="23" fill="#f4f7fb"/>
        <circle cx="1" cy="-34" r="23" fill="none" stroke="#c3d0de" stroke-width="2"/>
        <path d="M-14,-38 a 16 15 0 0 1 30,0 a 16 17 0 0 1 -30,0 Z" fill="#182437"/>
        <path d="M-9,-44 q 8,-6 17,-1" stroke="#5fd7ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
        <circle cx="-8" cy="-47" r="2" fill="#ffffff" opacity="0.8"/>
      </g>
    </g>
  </g>

  <!-- orbit ring accent behind text -->
  <ellipse cx="380" cy="185" rx="330" ry="86" fill="none" stroke="#3d5a80" stroke-width="1" opacity="0.35" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate" values="0 380 185; 360 380 185" dur="60s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="380" cy="185" r="4" fill="#5fd7ff" filter="url(#glow)">
    <animateMotion dur="12s" repeatCount="indefinite" path="M 330,-86 A 330 86 0 1 1 329.9,-86"/>
  </circle>

  <!-- title -->
  <text x="380" y="150" text-anchor="middle" font-family="'Segoe UI', Futura, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="6" fill="url(#titleGrad)" filter="url(#softGlow)">DEEPAK RAO GAIKWAD</text>
  <text x="380" y="188" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" letter-spacing="5" fill="#8fd3ff" opacity="0.95">PRINCIPAL ENGINEER &#183; MISSION CONTROL</text>
  <text x="380" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="2" fill="#7c8db0">
    <tspan>&gt; engineering scalable systems across the cloud universe_</tspan>
    <animate attributeName="opacity" values="1;1;0.35;1" keyTimes="0;0.8;0.9;1" dur="2.2s" repeatCount="indefinite"/>
  </text>

  <!-- bottom scanline -->
  <rect x="0" y="330" width="1000" height="3" fill="url(#titleGrad)" opacity="0.75">
    <animate attributeName="opacity" values="0.4;0.95;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
