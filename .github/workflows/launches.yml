name: Generate launch history

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  launches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate launches.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_launches.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet assets/launches.svg; then
            echo "No changes in launches.svg"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/launches.svg
          git commit -m "chore(assets): refresh launch history SVG"
          git pull --rebase origin main
          git push origin main
